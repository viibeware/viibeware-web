services:
  viibeware-web:
    build: .
    container_name: viibeware-web
    ports:
      - "8899:8899"
    volumes:
      - viibeware-data:/app/data
      - viibeware-uploads:/app/static/uploads
      # Optional: exposes the host's OS name to the server widget.
      # If your host doesn't have /etc/os-release, remove this line.
      - /etc/os-release:/host/etc/os-release:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8899/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  viibeware-data:
    driver: local
  viibeware-uploads:
    driver: local
