services:
  viibeware-web:
    build: .
    container_name: viibeware-web
    ports:
      - "8899:8899"
    volumes:
      - viibeware-data:/app/data
      - viibeware-uploads:/app/static/uploads
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8899/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  viibeware-data:
    driver: local
  viibeware-uploads:
    driver: local
