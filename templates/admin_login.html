<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — viibeware Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v={{ cache_v }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand"><em>viibe</em>ware admin</div>
      <div class="brand-sub">Sign in to continue</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}" style="position: static; margin-bottom: 1rem; opacity: 1; transform: none; animation: none;">
            <span>{{ msg }}</span>
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
